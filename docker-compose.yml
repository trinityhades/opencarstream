services:

  # ── Core streamer ─────────────────────────────────────────────────────────
  streamer:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    image: opencarstream:latest
    pull_policy: never
    container_name: opencarstream
    restart: unless-stopped
    # Use normal port publishing so localhost:33333 works on Docker Desktop.
    # If you need multicast RTP streams (rtp://@239.x.x.x) on Linux, you can
    # temporarily switch to host networking and remove the ports mapping below.
    ports:
      - "33333:33333"
    environment:
      PORT:          33333
      ADMIN_PASSWORD: "admin"   # Admin password for console/streams access (default: admin, set empty to disable)
      MJPEG_FPS:     60   # MJPEG fallback only; keep low for Tesla browser stability
      FFMPEG_QUALITY: 12  # 1=best quality, 31=smallest file
      STREAM_WIDTH:  854
      STREAM_HEIGHT: 480
      MP4_WIDTH:     1920
      MP4_HEIGHT:    1080
      MP4_VIDEO_BITRATE: 1800k
      MP4_AUDIO_BITRATE: 128k
      FFMPEG_HWACCEL: auto
      FFMPEG_H264_ENCODER: auto
      OGV_WIDTH:     1920
      OGV_HEIGHT:    1080
      OGV_FPS:       24
      OGV_VIDEO_QUALITY: 5
      OGV_AUDIO_BITRATE: 96k
      OGV_DEFAULT_PROFILE: auto
      MAX_STREAMS:   3    # max parallel videos
      PLUTO_LANGS:   es,en  # comma-separated Pluto TV regions: es, en, de, fr, it, …
      YT_LANG:       en    # BCP-47 tag for YouTube titles: es=Spanish, leave empty for original
      LOCAL_MEDIA_DIR: /media
      IPTV_LISTS_DIR: /iptv_lists
      SUBSCRIPTIONS_FILE: /config/subscriptions.json  # path inside container (default)
    # Generate subscriptions.json at home with:
    #   uv run sync_subscriptions.py --output config/subscriptions.json --cookies cookies.txt
    # Then mount it here so the streamer can read it without needing cookies.
    volumes:
      - ./iptv_lists:/iptv_lists:ro
      - ./local-media:/media/local-media:ro
      # Optional: mount extra host folders as siblings under /media.
      # Avoid nested bind mounts under another read-only mount.
      # - /home/santi/videos:/media/home-videos:ro
      # - /mnt/nas/media:/media/nas-media:ro
      - ./config:/config

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:33333/health"]
      interval: 30s
      timeout:  5s
      retries:  3


  # ── Optional nginx reverse proxy (TLS termination, custom domain) ─────────
  # Uncomment if you want nginx in front of the streamer.
  # Point your DDNS domain at your server IP, then set SERVER_NAME below.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: opencarstream-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - streamer
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro   # put your TLS certs here
  #   environment:
  #     SERVER_NAME: stream.yourdomain.com
